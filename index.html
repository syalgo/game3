<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>에스컬레이터 게임</title>
  <style>
    :root{
      --bg:#0f3d40;
      --stair:#ff3f7f;
      --player:#ff6a92;
      --text:#ff3f7f;
      --white:#ffffff;
    }
    html,body{height:100%;margin:0;background:#0b0b0b;font-family:system-ui,-apple-system,Segoe UI,Roboto,Pretendard,Apple SD Gothic Neo,sans-serif;}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;}
    canvas{background:var(--bg);border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.35);max-width:100%;height:auto;image-rendering:pixelated;}
    .hint{position:fixed;left:12px;bottom:10px;color:#cfcfcf;font-size:12px;opacity:.85;user-select:none;}
    .hint b{color:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c" width="782" height="436"></canvas>
  </div>
  <div class="hint">
    <b>조작</b> A(왼쪽) / D(오른쪽) / W(점프) · <b>R</b>(재시작) · (클릭 시작)
  </div>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  // ===== 튜닝 =====
  const STEP = 44;

  const GRAVITY = 1800;
  const MOVE_SPEED = 420;
  const JUMP_VY = 740;
  const AIR_CONTROL = 0.82;

  const BASE_FLOW = 150;
  const FLOW_ACCEL = 12;

  // ===== 플레이어 =====
  const player = {
    w: 22, h: 22,
    x: Math.floor(W * 0.45),
    y: Math.floor(H * 0.30),
    vx: 0, vy: 0,
    onGround: false
  };

  // ===== 입력 =====
  const key = { a:false, d:false, w:false };
  let wLock = false;

  addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k==="a") key.a=true;
    if (k==="d") key.d=true;
    if (k==="w" || k===" ") key.w=true;
    if (k==="r") reset();
    if (["a","d","w"," "].includes(k)) e.preventDefault();
  }, {passive:false});

  addEventListener("keyup", (e) => {
    const k = e.key.toLowerCase();
    if (k==="a") key.a=false;
    if (k==="d") key.d=false;
    if (k==="w" || k===" ") { key.w=false; wLock=false; }
  });

  // ===== 상태 =====
  let started = false;
  let dead = true;
  let survive = 0;
  let last = 0;

  // ===== 랭킹 =====
  const LS_KEY = "escalator_ranking_v3";
  const loadRanks = () => {
    try { const a = JSON.parse(localStorage.getItem(LS_KEY) || "[]"); return Array.isArray(a)?a:[]; }
    catch { return []; }
  };
  const saveRank = (s) => {
    const r = loadRanks();
    r.push(s);
    r.sort((a,b)=>b-a);
    const top = r.slice(0,10);
    localStorage.setItem(LS_KEY, JSON.stringify(top));
    return top;
  };

  // ===== 계단 기준점(앵커) =====
  const STAIRS_X0 = Math.floor(W * 0.60);
  const STAIRS_Y0 = Math.floor(H * 0.20);

  let anchorX = STAIRS_X0;
  let anchorY = STAIRS_Y0;

  function normalizeAnchor(){
    const k = Math.floor((STAIRS_X0 - anchorX) / STEP);
    if (k !== 0){
      anchorX += k * STEP;
      anchorY -= k * STEP; // 래핑 시 y도 같이 보정(튐 방지)
    }
  }

  function surfaceYAt(x){
    const dx = x - anchorX;
    const idx = Math.floor(dx / STEP);
    return anchorY - idx * STEP;
  }

  // 계단이 존재하는 x범위를 넓혀서(왼쪽도) 착지 가능하게
  function stairsExistAt(x){
    return x >= anchorX - STEP * 80; // 왼쪽으로 충분히 넓게
  }

  function reset(){
    started = true;
    dead = false;
    survive = 0;
    last = performance.now();

    player.x = Math.floor(W * 0.45);
    player.vx = 0;
    player.vy = 0;
    player.onGround = false;

    anchorX = STAIRS_X0;
    anchorY = STAIRS_Y0;

    // ✅ 시작할 때 계단 표면 위에 올려놓기
    const midX = player.x + player.w/2;
    const surfY = surfaceYAt(midX);
    player.y = surfY - player.h;
    player.onGround = true;
  }

  canvas.addEventListener("click", () => {
    if (!started || dead) reset();
  });

  function die(){
    dead = true;
    saveRank(Number(survive.toFixed(3)));
  }

  // ===== 업데이트 =====
  function update(dt){
    if (!started || dead) return;

    survive += dt;
    const flow = BASE_FLOW + FLOW_ACCEL * survive;

    anchorX -= flow * dt;
    anchorY += (flow * 0.18) * dt;
    normalizeAnchor();

    const wish = (key.d?1:0) - (key.a?1:0);
    const control = player.onGround ? 1.0 : AIR_CONTROL;
    player.vx = wish * MOVE_SPEED * control;

    if (key.w && player.onGround && !wLock){
      player.vy = -JUMP_VY;
      player.onGround = false;
      wLock = true;
    }

    const prevY = player.y;

    player.vy += GRAVITY * dt;

    player.x += player.vx * dt;
    player.y += player.vy * dt;

    if (player.y > H + 80) { die(); return; }
    if (player.x < -200 || player.x > W + 200) { die(); return; }

    // 착지: 위에서 내려오며 표면을 통과할 때만
    player.onGround = false;

    const midX = player.x + player.w/2;
    const surfY = surfaceYAt(midX);

    const prevBottom = prevY + player.h;
    const nowBottom  = player.y + player.h;

    if (stairsExistAt(midX)){
      if (player.vy >= 0 && prevBottom <= surfY && nowBottom >= surfY){
        player.y = surfY - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // ===== 렌더 =====
  function css(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

  function drawStairs(){
    ctx.fillStyle = css("--stair");

    // ✅ 계단 모양이 보이게 "x부터 오른쪽/아래"만 채우기
    // ✅ 단계 수를 크게 늘려서 낮은 단계는 x가 음수까지 가며 왼쪽 끝도 자연스럽게 핑크로 꽉 참
    const minI = -120;
    const maxI = 80;

    for (let i=minI; i<=maxI; i++){
      const x = anchorX + i*STEP;
      const y = anchorY - i*STEP;

      // y가 화면 아래보다 훨씬 아래면 굳이 그릴 필요 없음
      if (y > H + STEP) continue;

      // x가 너무 오른쪽이면 스킵
      if (x > W + STEP) continue;

      ctx.fillRect(x, y, (W - x) + 2, (H - y) + 2);
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    drawStairs();

    // 타이머
    ctx.fillStyle = css("--text");
    ctx.font = "700 32px system-ui, sans-serif";
    ctx.textBaseline = "top";
    ctx.textAlign = "left";
    ctx.fillText(survive.toFixed(3), 16, 12);

    if (!started || dead){
      ctx.fillStyle = css("--white");
      ctx.font = "800 28px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("클릭해서 시작", W/2, H/2 - 30);

      ctx.fillStyle = css("--text");
      ctx.font = "700 22px system-ui, sans-serif";
      ctx.fillText("A, W, D로 이동", W/2, H/2 + 10);

      const ranks = loadRanks();
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(W/2 - 160, H/2 + 50, 320, 160);

      ctx.fillStyle = css("--white");
      ctx.font = "800 18px system-ui, sans-serif";
      ctx.fillText("RANKING (TOP 10)", W/2, H/2 + 70);

      ctx.textAlign = "left";
      ctx.font = "700 16px system-ui, sans-serif";
      for (let i=0;i<Math.min(10, ranks.length);i++){
        ctx.fillText(`${String(i+1).padStart(2," ")}.  ${Number(ranks[i]).toFixed(3)}s`, W/2 - 140, H/2 + 95 + i*14);
      }
      ctx.textAlign = "center";
      return;
    }

    // 플레이어
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    const tilt = Math.max(-0.35, Math.min(0.35, player.vy * 0.0008));
    ctx.rotate(tilt);
    ctx.fillStyle = css("--player");
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
    ctx.restore();
  }

  function loop(now){
    if (!last) last = now;
    const dt = Math.min(0.033, (now - last)/1000);
    last = now;

    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
