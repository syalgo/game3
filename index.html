<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>에스컬레이터 게임</title>
  <style>
    :root{
      --bg:#0f3d40;     /* 청록 배경 */
      --stair:#ff3f7f;  /* 핫핑크 계단 */
      --player:#ff6a92; /* 플레이어 */
      --text:#ff3f7f;   /* 글자 */
      --white:#ffffff;
    }
    html,body{height:100%;margin:0;background:#0b0b0b;font-family:system-ui,-apple-system,Segoe UI,Roboto,Pretendard,Apple SD Gothic Neo,sans-serif;}
    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      box-sizing:border-box;
    }
    canvas{
      background:var(--bg);
      border-radius:14px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      max-width:100%;
      height:auto;
      image-rendering:pixelated;
    }
    .hint{
      position:fixed;
      left:12px;
      bottom:10px;
      color:#cfcfcf;
      font-size:12px;
      opacity:.8;
      user-select:none;
    }
    .hint b{color:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c" width="782" height="436"></canvas>
  </div>
  <div class="hint">
    <b>조작</b> A(왼쪽) / D(오른쪽) / W(점프) · <b>R</b>(재시작)
  </div>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  // ====== 화면/월드 설정 ======
  const W = canvas.width, H = canvas.height;

  // 계단(픽셀 느낌)
  const STEP = 44;      // 계단 한 칸 크기 (영상처럼 큼직하게)
  const STAIRS_X0 = Math.floor(W * 0.60);  // 오른쪽에서 시작
  const STAIRS_Y0 = Math.floor(H * 0.20);

  // 물리
  const GRAVITY = 1700;     // px/s^2
  const MOVE_SPEED = 420;   // px/s
  const JUMP_VY = 720;      // 점프 힘
  const AIR_CONTROL = 0.82; // 공중 제어 약간 감소

  // 난이도(에스컬레이터가 왼쪽/아래로 흐르는 느낌)
  const BASE_FLOW = 130;     // px/s
  const FLOW_ACCEL = 10;     // px/s per second (시간 지날수록 빨라짐)

  // 플레이어
  const player = {
    w: 22, h: 22,
    x: Math.floor(W * 0.45),
    y: Math.floor(H * 0.35),
    vx: 0, vy: 0,
    onGround: false,
  };

  // 입력
  const key = { a:false, d:false, w:false };
  let wPressedLock = false;

  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k === "a") key.a = true;
    if (k === "d") key.d = true;
    if (k === "w") key.w = true;
    if (k === "r") reset();
    if (["a","d","w"," "].includes(k)) e.preventDefault();
  }, {passive:false});

  window.addEventListener("keyup", (e) => {
    const k = e.key.toLowerCase();
    if (k === "a") key.a = false;
    if (k === "d") key.d = false;
    if (k === "w") { key.w = false; wPressedLock = false; }
  });

  // ====== 게임 상태 ======
  let started = false;
  let dead = false;
  let t0 = 0;
  let last = 0;
  let surviveTime = 0;

  // 랭킹
  const LS_KEY = "escalator_ranking_v1";
  function loadRanks(){
    try{
      const a = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
      return Array.isArray(a) ? a : [];
    }catch{ return []; }
  }
  function saveRank(score){
    const ranks = loadRanks();
    ranks.push(score);
    ranks.sort((a,b)=>b-a);
    const top = ranks.slice(0,10);
    localStorage.setItem(LS_KEY, JSON.stringify(top));
    return top;
  }

  // ====== 계단(무한) ======
  // 화면에는 "계단 모양"만 그리면 되므로,
  // 실제로는 기준점(baseX, baseY)을 시간에 따라 흘려주고
  // 그 위에 계단들을 반복 렌더링한다.
  let baseX = STAIRS_X0;
  let baseY = STAIRS_Y0;

  function reset(){
    started = true;
    dead = false;
    surviveTime = 0;
    t0 = performance.now();
    last = t0;

    player.x = Math.floor(W * 0.45);
    player.y = Math.floor(H * 0.30);
    player.vx = 0;
    player.vy = 0;
    player.onGround = false;

    baseX = STAIRS_X0;
    baseY = STAIRS_Y0;
  }

  // 시작 화면 클릭
  canvas.addEventListener("click", () => {
    if (!started || dead) reset();
  });

  // ====== 충돌 유틸 ======
  function rectIntersect(ax, ay, aw, ah, bx, by, bw, bh){
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // 계단은 "큰 핑크 블록이 계단 형태로 쌓인 영역"으로 표현
  // -> 충돌을 위해, 플레이어 아래에 있는 "현재 밟는 계단 높이"를 계산한다.
  function stairSurfaceYAt(x){
    // 계단이 올라가는 방향: 오른쪽으로 갈수록 위로(계단이 높아짐)
    // 기준(baseX, baseY)에서 왼쪽/아래로 계단이 무한히 이어진다고 가정.
    // x가 baseX보다 오른쪽이면 더 위 단계.
    const dx = x - baseX;
    const stepIndex = Math.floor(dx / STEP); // 오른쪽으로 갈수록 단계 증가
    // 해당 단계의 윗면 y
    return baseY - stepIndex * STEP;
  }

  // 해당 x 위치에서 "계단이 존재하는지"(핑크 영역인지) 판단
  function isOnStairs(x, y){
    // 계단 영역은 baseX에서 시작해서 오른쪽 아래가 꽉 차있는 계단 덩어리
    // 즉, (x,y)가 계단의 내부면 true
    // 계단은 '계단 윗면'보다 아래는 전부 핑크(막힌 공간)
    const surface = stairSurfaceYAt(x);
    return (x >= baseX - STEP*20) && (y >= surface); // 대략 충분히 왼쪽까지 허용
  }

  // ====== 업데이트 ======
  function update(dt){
    if (!started || dead) return;

    // 생존 시간
    surviveTime += dt;

    // 에스컬레이터 흐름(시간이 지날수록 가속)
    const flow = BASE_FLOW + FLOW_ACCEL * surviveTime;

    // 계단 기준점 이동: 왼쪽/아래로 흘러가게
    baseX -= flow * dt;
    baseY += (flow * 0.22) * dt; // 살짝 아래로도 내려가게(영상 느낌)

    // 기준점이 너무 왼쪽으로 가면 보정(무한처럼 보이게)
    // STEP 단위로 되감기
    while (baseX < STAIRS_X0 - STEP){
      baseX += STEP;
      baseY -= STEP; // 계단 구조 유지
    }
    while (baseX > STAIRS_X0 + STEP){
      baseX -= STEP;
      baseY += STEP;
    }

    // 좌우 입력
    const wish = (key.d ? 1 : 0) - (key.a ? 1 : 0);
    const control = player.onGround ? 1.0 : AIR_CONTROL;
    player.vx = wish * MOVE_SPEED * control;

    // 점프(한 번만)
    if (key.w && player.onGround && !wPressedLock){
      player.vy = -JUMP_VY;
      player.onGround = false;
      wPressedLock = true;
    }

    // 중력
    player.vy += GRAVITY * dt;

    // 이동(우선 x)
    player.x += player.vx * dt;

    // 화면 밖 약간은 허용하되, 너무 나가면 죽음
    if (player.x < -80 || player.x > W + 80) {
      die();
      return;
    }

    // 이동(y)
    player.y += player.vy * dt;

    // 계단 충돌(바닥)
    // 플레이어 중심 x 기준으로 표면 y 계산
    const pxMid = player.x + player.w/2;
    const surfaceY = stairSurfaceYAt(pxMid);

    // 계단 영역 위인지(핑크 위에 착지 가능한지)
    // 플레이어 바닥이 표면 아래로 내려가면 착지
    const playerBottom = player.y + player.h;

    // 계단이 화면 오른쪽에 있을 때만 의미(왼쪽 너무 멀면 취급 X)
    const stairExists = (pxMid > baseX - STEP*2);

    if (stairExists && playerBottom >= surfaceY && playerBottom <= surfaceY + 30 && player.vy >= 0) {
      // 착지
      player.y = surfaceY - player.h;
      player.vy = 0;
      player.onGround = true;
    } else {
      player.onGround = false;
    }

    // 계단 "안쪽"(핑크 영역)으로 파고들면 옆에서 튕기기 (간단 처리)
    // 플레이어 좌표가 핑크 내부면, 가장 가까운 표면 위로 올려주거나 왼쪽으로 밀어냄
    const inside = isOnStairs(pxMid, player.y + player.h*0.8);
    if (inside && !player.onGround) {
      // 아래로 떨어지면서 내부로 들어간 경우 위로 올리기
      if (player.vy > 0 && playerBottom > surfaceY) {
        player.y = surfaceY - player.h;
        player.vy = 0;
        player.onGround = true;
      } else {
        // 옆으로 파고든 경우 살짝 왼쪽으로 밀기
        player.x -= 120 * dt;
      }
    }

    // 바닥 아래로 떨어지면 죽음
    if (player.y > H + 60) {
      die();
      return;
    }
  }

  function die(){
    dead = true;
    const top = saveRank(Number(surviveTime.toFixed(3)));
    // 다음 렌더에서 표시
  }

  // ====== 렌더 ======
  function draw(){
    // 배경
    ctx.clearRect(0,0,W,H);

    // 계단 그리기: 오른쪽 아래가 꽉 찬 "계단 덩어리"
    ctx.fillStyle = getCss("--stair");
    // 충분히 많은 계단 칸을 그려서 화면을 덮는다
    // (step i의 사각형은 오른쪽 아래에 채워지는 형태)
    const stepsToDraw = 30;
    for (let i = -2; i < stepsToDraw; i++){
      const x = baseX + i * STEP;
      const y = baseY - i * STEP;
      // i단계부터 오른쪽 아래를 채우는 큰 직사각형을 그리면 계단 형태가 된다
      // (x, y)부터 오른쪽 끝/아래 끝까지 채움
      ctx.fillRect(x, y, W - x + 2, H - y + 2);
    }

    // 타이머
    ctx.fillStyle = getCss("--text");
    ctx.font = "700 32px system-ui, sans-serif";
    ctx.textBaseline = "top";
    const t = started ? (dead ? surviveTime : surviveTime) : 0;
    ctx.fillText((t).toFixed(3), 16, 12);

    // 안내 문구(처음/리스타트 직후)
    if (!started || dead){
      ctx.fillStyle = getCss("--white");
      ctx.font = "700 28px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("클릭해서 시작", W/2, H/2 - 30);

      ctx.fillStyle = getCss("--text");
      ctx.font = "700 22px system-ui, sans-serif";
      ctx.fillText("A, W, D로 이동", W/2, H/2 + 10);

      // 랭킹 표시
      const ranks = loadRanks();
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(W/2 - 160, H/2 + 50, 320, 160);

      ctx.fillStyle = getCss("--white");
      ctx.font = "700 18px system-ui, sans-serif";
      ctx.fillText("RANKING (TOP 10)", W/2, H/2 + 70);

      ctx.textAlign = "left";
      ctx.font = "600 16px system-ui, sans-serif";
      for (let i=0;i<Math.min(10, ranks.length);i++){
        const s = Number(ranks[i]).toFixed(3);
        const line = `${String(i+1).padStart(2," ")}.  ${s}s`;
        ctx.fillText(line, W/2 - 140, H/2 + 95 + i*14);
      }

      ctx.textAlign = "center";
    }

    // 플레이어
    if (started && !dead){
      ctx.save();
      ctx.translate(player.x + player.w/2, player.y + player.h/2);

      // 약간의 기울기(영상처럼)
      const tilt = clamp(player.vy * 0.0008, -0.35, 0.35);
      ctx.rotate(tilt);

      ctx.fillStyle = getCss("--player");
      ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
      ctx.restore();
    }
  }

  function getCss(v){
    return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  }
  function clamp(x,a,b){ return Math.max(a, Math.min(b,x)); }

  // ====== 루프 ======
  function loop(now){
    if (!last) last = now;
    const dt = Math.min(0.033, (now - last) / 1000); // 안전
    last = now;

    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // 처음에는 시작 화면
  started = false;
  dead = true; // 랭킹 패널 보이게
})();
</script>
</body>
</html>
