<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>에스컬레이터 게임</title>
  <style>
    :root{
      --bg:#0f3d40;
      --stair:#ff3f7f;
      --player:#ff6a92;
      --text:#ff3f7f;
      --white:#ffffff;
    }
    html,body{height:100%;margin:0;background:#0b0b0b;font-family:system-ui,-apple-system,Segoe UI,Roboto,Pretendard,Apple SD Gothic Neo,sans-serif;}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;}
    canvas{background:var(--bg);border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.35);max-width:100%;height:auto;image-rendering:pixelated;}
    .hint{position:fixed;left:12px;bottom:10px;color:#cfcfcf;font-size:12px;opacity:.85;user-select:none;}
    .hint b{color:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c" width="782" height="436"></canvas>
  </div>
  <div class="hint">
    <b>조작</b> A(왼쪽) / D(오른쪽) / W(점프) · <b>R</b>(재시작) · (클릭 시작)
  </div>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  // ===== 튜닝 =====
  const STEP = 44;

  const GRAVITY = 1800;
  const MOVE_SPEED = 420;
  const JUMP_VY = 740;
  const AIR_CONTROL = 0.82;

  const BASE_FLOW = 150;
  const FLOW_ACCEL = 12;

  // ===== 플레이어 =====
  const player = {
    w: 22, h: 22,
    x: Math.floor(W * 0.45),
    y: Math.floor(H * 0.30),
    vx: 0, vy: 0,
    onGround: false
  };

  // ===== 입력 =====
  const key = { a:false, d:false, w:false };
  let wLock = false;

  addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k==="a") key.a=true;
    if (k==="d") key.d=true;
    if (k==="w" || k===" ") key.w=true;
    if (k==="r") reset();
    if (["a","d","w"," "].includes(k)) e.preventDefault();
  }, {passive:false});

  addEventListener("keyup", (e) => {
    const k = e.key.toLowerCase();
    if (k==="a") key.a=false;
    if (k==="d") key.d=false;
    if (k==="w" || k===" ") { key.w=false; wLock=false; }
  });

  // ===== 상태 =====
  let started = false;
  let dead = true;
  let survive = 0;
  let last = 0;

  // ===== 랭킹 =====
  const LS_KEY = "escalator_ranking_v2";
  const loadRanks = () => {
    try { const a = JSON.parse(localStorage.getItem(LS_KEY) || "[]"); return Array.isArray(a)?a:[]; }
    catch { return []; }
  };
  const saveRank = (s) => {
    const r = loadRanks();
    r.push(s);
    r.sort((a,b)=>b-a);
    const top = r.slice(0,10);
    localStorage.setItem(LS_KEY, JSON.stringify(top));
    return top;
  };

  // ===== 계단 기준점(월드 앵커) =====
  // 계단 선(윗면)이 anchor를 기준으로 y = anchorY - floor((x-anchorX)/STEP)*STEP
  // 흐름으로 anchorX만 계속 이동시키되, STEP 래핑 시 anchorY를 같이 보정해서 "튐" 제거.
  const STAIRS_X0 = Math.floor(W * 0.60);
  const STAIRS_Y0 = Math.floor(H * 0.20);

  let anchorX = STAIRS_X0;
  let anchorY = STAIRS_Y0;

  function normalizeAnchor(){
    // anchorX가 기준에서 너무 멀어지면 STEP 단위로 되감고, 그만큼 anchorY도 함께 보정
    const k = Math.floor((STAIRS_X0 - anchorX) / STEP);
    if (k !== 0){
      anchorX += k * STEP;
      anchorY -= k * STEP; // 계단 기울기 유지 (중요: 이게 "계속 올라감" 버그 방지 핵심)
    }
  }

  function surfaceYAt(x){
    const dx = x - anchorX;
    const idx = Math.floor(dx / STEP);     // 오른쪽으로 갈수록 idx 증가
    return anchorY - idx * STEP;
  }

  // 계단이 존재하는 영역: anchorX 근처(오른쪽)부터 시작해서 오른쪽/아래로 꽉 찬 덩어리
  function stairsExistAt(x){
    return x >= anchorX - STEP*0.5; // 계단 시작선 약간 여유
  }

  function reset(){
    started = true;
    dead = false;
    survive = 0;
    last = performance.now();

    player.x = Math.floor(W * 0.45);
    player.y = Math.floor(H * 0.30);
    player.vx = 0;
    player.vy = 0;
    player.onGround = false;

    anchorX = STAIRS_X0;
    anchorY = STAIRS_Y0;
  }

  canvas.addEventListener("click", () => {
    if (!started || dead) reset();
  });

  function die(){
    dead = true;
    saveRank(Number(survive.toFixed(3)));
  }

  // ===== 업데이트 =====
  function update(dt){
    if (!started || dead) return;

    survive += dt;
    const flow = BASE_FLOW + FLOW_ACCEL * survive;

    // 계단이 왼쪽으로 흐르는 느낌
    anchorX -= flow * dt;
    // 살짝 아래로 내려가는 느낌(시각/난이도)
    anchorY += (flow * 0.18) * dt;

    normalizeAnchor();

    // 입력 → 속도
    const wish = (key.d?1:0) - (key.a?1:0);
    const control = player.onGround ? 1.0 : AIR_CONTROL;
    player.vx = wish * MOVE_SPEED * control;

    // 점프(한 번)
    if (key.w && player.onGround && !wLock){
      player.vy = -JUMP_VY;
      player.onGround = false;
      wLock = true;
    }

    // 이전 위치 저장(착지 판정용)
    const prevY = player.y;

    // 중력
    player.vy += GRAVITY * dt;

    // 이동
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // 화면 아래로 떨어지면 사망
    if (player.y > H + 80) { die(); return; }
    // 좌우 너무 벗어나면 사망(선택)
    if (player.x < -120 || player.x > W + 120) { die(); return; }

    // ===== 착지 판정 (중요: "위에서 내려올 때만" 착지) =====
    player.onGround = false;

    const midX = player.x + player.w/2;
    const surfY = surfaceYAt(midX);

    const prevBottom = prevY + player.h;
    const nowBottom  = player.y + player.h;

    // 계단 영역 위에 있을 때만 착지 가능
    if (stairsExistAt(midX)){
      // 위에서 아래로 내려오며 표면을 통과할 때만 착지
      if (player.vy >= 0 && prevBottom <= surfY && nowBottom >= surfY){
        player.y = surfY - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }

    // 계단 안쪽(핑크 내부)로 파고들면 위로 밀어내기 (관통 방지)
    // (계단 영역인데 표면보다 아래면 내부)
    if (stairsExistAt(midX)){
      if ((player.y + player.h*0.8) > surfY && !player.onGround){
        // 아래로 내려가는 중이면 표면으로 올림
        if (player.vy > 0){
          player.y = surfY - player.h;
          player.vy = 0;
          player.onGround = true;
        } else {
          // 위로 가는 중이면 살짝 왼쪽으로 밀기
          player.x -= 160 * dt;
        }
      }
    }
  }

  // ===== 렌더 =====
  function css(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

  function drawStairs(){
    ctx.fillStyle = css("--stair");

    // "왼쪽 끝까지 꽉 차게" 만들기:
    // 계단 윗면들을 그리면서, 각 단계마다 (0,y)~(W,H)까지 채워서
    // 왼쪽/아래가 무조건 핑크로 꽉 차게 만든다.
    const minI = -6;
    const maxI = 40;
    for (let i=minI; i<=maxI; i++){
      const x = anchorX + i*STEP;
      const y = anchorY - i*STEP;

      // 화면 위로 너무 올라간 건 스킵
      if (y > H+STEP) continue;

      // 핵심: x부터가 아니라 "0부터" 채워서 왼쪽이 비지 않게
      // 다만 계단 형태는 유지되어야 하므로 y만 계단 단계대로 변한다.
      ctx.fillRect(0, y, W, H - y + 2);
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    // 계단
    drawStairs();

    // 타이머
    ctx.fillStyle = css("--text");
    ctx.font = "700 32px system-ui, sans-serif";
    ctx.textBaseline = "top";
    ctx.textAlign = "left";
    ctx.fillText(survive.toFixed(3), 16, 12);

    // 시작/게임오버 화면
    if (!started || dead){
      ctx.fillStyle = css("--white");
      ctx.font = "800 28px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("클릭해서 시작", W/2, H/2 - 30);

      ctx.fillStyle = css("--text");
      ctx.font = "700 22px system-ui, sans-serif";
      ctx.fillText("A, W, D로 이동", W/2, H/2 + 10);

      // 랭킹 패널
      const ranks = loadRanks();
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(W/2 - 160, H/2 + 50, 320, 160);

      ctx.fillStyle = css("--white");
      ctx.font = "800 18px system-ui, sans-serif";
      ctx.fillText("RANKING (TOP 10)", W/2, H/2 + 70);

      ctx.textAlign = "left";
      ctx.font = "700 16px system-ui, sans-serif";
      for (let i=0;i<Math.min(10, ranks.length);i++){
        ctx.fillText(`${String(i+1).padStart(2," ")}.  ${Number(ranks[i]).toFixed(3)}s`, W/2 - 140, H/2 + 95 + i*14);
      }
      ctx.textAlign = "center";
      return;
    }

    // 플레이어
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    const tilt = Math.max(-0.35, Math.min(0.35, player.vy * 0.0008));
    ctx.rotate(tilt);
    ctx.fillStyle = css("--player");
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
    ctx.restore();
  }

  function loop(now){
    if (!last) last = now;
    const dt = Math.min(0.033, (now - last)/1000);
    last = now;

    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
